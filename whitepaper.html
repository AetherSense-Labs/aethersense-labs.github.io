<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherSense - Whitepaper</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #00f2ff; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        h1 { 
            font-size: 6rem; 
            text-transform: uppercase; 
            letter-spacing: 15px; 
            margin: 0; 
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff; opacity: 0.8; }
            to { text-shadow: 0 0 20px #00f2ff, 0 0 30px #00f2ff, 0 0 40px #00f2ff; opacity: 1; }
        }
        .back-link { 
            position: absolute; 
            top: 30px; 
            left: 30px; 
            color: #555; 
            text-decoration: none; 
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .back-link:hover { 
            color: #00f2ff; 
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Return to Core</a>
    <h1>SOON</h1>
</body>
</html>
